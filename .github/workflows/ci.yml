name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: typecheck / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint (Biome)
        run: npm run lint

      - name: Test (Vitest)
        run: npm test

      - name: Build
        env:
          # Build-time only; never used to sign real sessions. lib/auth requires
          # AUTH_SECRET in production (NODE_ENV=production during `next build`).
          AUTH_SECRET: ci-build-placeholder-not-used-at-runtime-32chars
        run: npm run build
